<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0a0a0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>🪁 Estudio de Pipa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0a0a0f;--surface:#12121a;--card:#1c1c28;--border:#ffffff12;--border2:#ffffff22;
  --gold:#f5c518;--gold-dk:#c9a200;--red:#e63946;--text:#f0eff4;--muted:#6b6b7f;--muted2:#9898ae;
  --r:12px;--tr:0.2s cubic-bezier(.4,0,.2,1);--safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;display:flex;flex-direction:column}

/* HEADER */
header{flex-shrink:0;background:linear-gradient(90deg,#0a0a0f,#14141f,#0a0a0f);border-bottom:1px solid var(--border2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;z-index:200}
.hd-left{display:flex;align-items:center;gap:10px}
.logo-mark{width:36px;height:36px;background:linear-gradient(135deg,var(--gold),var(--red));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;box-shadow:0 0 16px #f5c51830;flex-shrink:0}
.hd-title{font-family:'Black Han Sans',sans-serif;font-size:1.2rem;letter-spacing:1px;background:linear-gradient(90deg,var(--gold) 30%,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hd-sub{font-size:0.6rem;color:var(--muted2);letter-spacing:2px;text-transform:uppercase}
.count-pill{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:4px 11px;font-size:0.65rem;color:var(--muted2);font-weight:700;letter-spacing:0.8px;text-transform:uppercase;white-space:nowrap}

/* APP */
.app{flex:1;display:flex;overflow:hidden}

/* SIDEBAR DESKTOP */
.sidebar{width:280px;min-width:260px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.sb-sec{padding:16px;border-bottom:1px solid var(--border)}
.sec-lbl{font-family:'Black Han Sans',sans-serif;font-size:0.65rem;letter-spacing:3px;color:var(--muted);text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.sec-lbl::after{content:'';flex:1;height:1px;background:var(--border)}
.c-block{margin-bottom:12px}
.c-lbl{font-size:0.68rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;display:block}
.c-row{display:flex;gap:7px;align-items:flex-start}
.swatch{width:32px;height:32px;border-radius:7px;border:2px solid var(--border2);cursor:pointer;overflow:hidden;position:relative;transition:border-color var(--tr),transform var(--tr);flex-shrink:0}
.swatch:hover{border-color:var(--gold);transform:scale(1.08)}
.swatch input[type=color]{position:absolute;top:-4px;left:-4px;width:calc(100% + 8px);height:calc(100% + 8px);opacity:0;cursor:pointer;border:none;padding:0}
.swatch-inner{width:100%;height:100%;border-radius:5px;pointer-events:none}
.presets{display:flex;flex-wrap:wrap;gap:5px}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform var(--tr),border-color var(--tr);flex-shrink:0}
.dot:hover,.dot:active{transform:scale(1.3);border-color:#fff7}
.upload-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:14px;text-align:center;cursor:pointer;transition:border-color var(--tr),background var(--tr);position:relative}
.upload-zone:hover{border-color:var(--gold);background:#f5c5180a}
.upload-zone input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.uico{font-size:1.6rem;margin-bottom:4px}
.upload-zone p{font-size:0.68rem;color:var(--muted2);line-height:1.5}
#logo-thumb{width:56px;height:56px;object-fit:contain;border-radius:7px;border:1px solid var(--border2);display:none;margin:0 auto 7px}
.sl-row{margin-top:8px}
.sl-row label{font-size:0.66rem;color:var(--muted2);display:flex;justify-content:space-between;margin-bottom:3px}
input[type=range]{width:100%;accent-color:var(--gold);cursor:pointer}
.btn{border:none;border-radius:var(--r);cursor:pointer;font-family:'Outfit',sans-serif;font-weight:700;font-size:0.82rem;transition:all var(--tr);display:flex;align-items:center;justify-content:center;gap:6px;padding:10px 14px;width:100%}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold-dk));color:#000}
.btn-gold:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-gold:active{transform:scale(0.97)}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted2)}
.btn-ghost:hover{border-color:var(--gold);color:var(--gold)}
.btn-ghost:active{transform:scale(0.97)}
.btn-rand{background:linear-gradient(135deg,#7b2ff7,#e63946,#f5c518);background-size:200%;color:#fff;animation:gs 3s ease infinite}
.btn-rand:active{transform:scale(0.97)}
@keyframes gs{0%,100%{background-position:0%}50%{background-position:100%}}
.btn-dl{background:var(--card);border:1px solid var(--border2);color:var(--text)}
.btn-dl:hover{background:var(--gold);color:#000;border-color:var(--gold)}
.btn-dl:active{transform:scale(0.97)}
.btns-col{display:flex;flex-direction:column;gap:7px}

/* MAIN */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
.gallery-head{padding:14px 20px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;flex-shrink:0}
.gallery-head h2{font-family:'Black Han Sans',sans-serif;font-size:0.85rem;letter-spacing:2px;color:var(--muted2);text-transform:uppercase}
.tabs-wrap{display:flex;gap:5px;flex-wrap:wrap}
.tab{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:0.65rem;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all var(--tr);white-space:nowrap}
.tab:hover{border-color:var(--gold);color:var(--gold)}
.tab.active{background:var(--gold);color:#000;border-color:var(--gold)}
.pat-gallery{padding:12px 18px;display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:8px;overflow-y:auto;max-height:240px;flex-shrink:0;scrollbar-width:thin;scrollbar-color:var(--border2) transparent}
.pat-card{background:var(--card);border:2px solid var(--border);border-radius:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 3px;transition:all var(--tr);position:relative;overflow:hidden}
.pat-card:hover{border-color:#f5c51866;transform:translateY(-2px)}
.pat-card:active{transform:scale(0.95)}
.pat-card.active{border-color:var(--gold);box-shadow:0 0 12px #f5c51820}
.pat-card canvas{width:62px;height:70px;border-radius:5px;display:block}
.pat-card span{font-size:0.54rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.3px;text-align:center;line-height:1.2;padding:0 2px}
.pat-card.active span{color:var(--gold)}
.chk{position:absolute;top:3px;right:3px;width:14px;height:14px;background:var(--gold);border-radius:50%;display:none;align-items:center;justify-content:center;font-size:0.48rem;color:#000;font-weight:900}
.pat-card.active .chk{display:flex}

/* STAGE */
.stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;gap:12px;background:radial-gradient(ellipse at center,#1a1a2e 0%,#0a0a0f 70%);position:relative;overflow:hidden}
.stage::before{content:'';position:absolute;inset:0;background-image:radial-gradient(circle,#ffffff04 1px,transparent 1px);background-size:24px 24px;pointer-events:none}
#kite-canvas{max-width:100%;max-height:100%;filter:drop-shadow(0 8px 40px rgba(0,0,0,.9));position:relative;z-index:1}
.pname-tag{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:4px 14px;font-size:0.68rem;font-weight:700;color:var(--muted2);letter-spacing:1.5px;text-transform:uppercase;position:relative;z-index:1;flex-shrink:0}
.stage-btns{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;position:relative;z-index:1;flex-shrink:0}
.stage-btns .btn{width:auto;padding:8px 20px;font-size:0.8rem}

::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ══════════════════════════════════
   MOBILE ≤ 779px
══════════════════════════════════ */
@media(max-width:779px){
  .sidebar{display:none}
  .gallery-head{display:none}
  .pat-gallery{display:none}

  .stage{
    padding:10px 10px 6px;
    gap:8px;
    padding-bottom:calc(66px + var(--safe-b) + 10px);
  }
  #kite-canvas{
    max-height:calc(100dvh - 170px);
    max-width:calc(100vw - 20px);
  }
  .pname-tag{font-size:0.6rem;padding:3px 12px}
  .stage-btns{display:none}

  /* FAB download */
  .fab-dl{
    position:fixed;bottom:calc(66px + var(--safe-b) + 12px);right:14px;
    width:46px;height:46px;border-radius:50%;
    background:var(--card);border:1px solid var(--border2);
    color:var(--text);font-size:1.2rem;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;z-index:10;
    box-shadow:0 4px 16px rgba(0,0,0,.5);
    transition:all var(--tr);
  }
  .fab-dl:active{transform:scale(0.88);background:var(--gold);color:#000}

  /* BOTTOM NAV */
  .mobile-nav{
    position:fixed;bottom:0;left:0;right:0;
    height:calc(58px + var(--safe-b));
    background:rgba(14,14,20,0.97);
    backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
    border-top:1px solid var(--border2);
    display:flex;align-items:flex-start;justify-content:space-around;
    padding-top:6px;padding-bottom:var(--safe-b);
    z-index:300;
  }
  .nav-btn{
    display:flex;flex-direction:column;align-items:center;gap:2px;
    background:none;border:none;cursor:pointer;padding:4px 10px;
    color:var(--muted);transition:color var(--tr);font-family:'Outfit',sans-serif;
    min-width:60px;
  }
  .nav-btn.active{color:var(--gold)}
  .nav-ico{font-size:1.25rem;line-height:1}
  .nav-lbl{font-size:0.55rem;font-weight:700;text-transform:uppercase;letter-spacing:0.5px}

  /* OVERLAY */
  .sheet-overlay{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    z-index:400;opacity:0;pointer-events:none;
    transition:opacity 0.25s;
  }
  .sheet-overlay.vis{opacity:1;pointer-events:all}

  /* BOTTOM SHEET */
  .bottom-sheet{
    position:fixed;left:0;right:0;bottom:0;
    background:var(--surface);
    border-radius:20px 20px 0 0;
    border-top:1px solid var(--border2);
    z-index:500;
    transform:translateY(100%);
    transition:transform 0.3s cubic-bezier(.32,0,.36,1);
    display:flex;flex-direction:column;
    max-height:80vh;
  }
  .bottom-sheet.open{transform:translateY(0)}
  .sh-handle{width:36px;height:4px;background:var(--muted);border-radius:2px;margin:10px auto 4px;flex-shrink:0}
  .sh-title{font-family:'Black Han Sans',sans-serif;font-size:0.85rem;letter-spacing:2px;color:var(--muted2);text-transform:uppercase;padding:4px 18px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
  .sh-body{overflow-y:auto;flex:1;padding:14px 16px;padding-bottom:calc(16px + var(--safe-b));scrollbar-width:thin;scrollbar-color:var(--border2) transparent}

  /* Categorias no sheet */
  .mob-cats{display:flex;gap:6px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none;margin-bottom:6px}
  .mob-cats::-webkit-scrollbar{display:none}
  .mob-cat{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:5px 14px;font-size:0.65rem;font-weight:700;letter-spacing:0.7px;text-transform:uppercase;color:var(--muted2);cursor:pointer;transition:all var(--tr);white-space:nowrap;flex-shrink:0}
  .mob-cat.active{background:var(--gold);color:#000;border-color:var(--gold)}
  .mob-cat:active{transform:scale(0.93)}

  /* Gallery no sheet */
  .mob-gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(76px,1fr));gap:8px;padding-top:2px}

  /* Cores no sheet */
  .mob-colors{display:flex;flex-direction:column;gap:16px}
  .mob-c-row{display:flex;align-items:flex-start;gap:10px}
  .mob-c-label{font-size:0.68rem;font-weight:700;color:var(--muted2);text-transform:uppercase;letter-spacing:0.8px;width:52px;flex-shrink:0;padding-top:7px}
  .mob-swatch{width:38px;height:38px;border-radius:9px;border:2px solid var(--border2);cursor:pointer;overflow:hidden;position:relative;flex-shrink:0;transition:border-color var(--tr)}
  .mob-swatch:active{transform:scale(0.9)}
  .mob-swatch input[type=color]{position:absolute;top:-4px;left:-4px;width:calc(100% + 8px);height:calc(100% + 8px);opacity:0;cursor:pointer;border:none;padding:0}
  .mob-swatch-inner{width:100%;height:100%;border-radius:7px;pointer-events:none}
  .mob-dots{display:flex;flex-wrap:wrap;gap:7px;flex:1}
  .mob-dot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform var(--tr),border-color var(--tr);flex-shrink:0}
  .mob-dot:active{transform:scale(1.3);border-color:#fff8}

  /* Upload no sheet */
  .mob-upload{border:2px dashed var(--border2);border-radius:var(--r);padding:20px;text-align:center;cursor:pointer;position:relative;margin-bottom:14px}
  .mob-upload:active{border-color:var(--gold)}
  .mob-upload input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
  .mob-upload .uico{font-size:2rem;margin-bottom:6px}
  .mob-upload p{font-size:0.72rem;color:var(--muted2);line-height:1.6}
  #mob-logo-thumb{width:70px;height:70px;object-fit:contain;border-radius:9px;border:1px solid var(--border2);display:none;margin:0 auto 10px}
  .mob-sl-row{margin-bottom:12px}
  .mob-sl-row label{font-size:0.7rem;color:var(--muted2);display:flex;justify-content:space-between;margin-bottom:5px}

  /* Ações no sheet */
  .mob-actions{display:flex;flex-direction:column;gap:10px}
  .mob-actions .btn{font-size:0.92rem;padding:14px}
}

@media(min-width:780px){
  .mobile-nav,.sheet-overlay,.bottom-sheet,.fab-dl{display:none!important}
}
</style>
</head>
<body>

<header>
  <div class="hd-left">
    <div class="logo-mark">🪁</div>
    <div>
      <div class="hd-title">ESTUDIO DE PIPA</div>
      <div class="hd-sub">Design &amp; criação de folhas</div>
    </div>
  </div>
  <div class="count-pill" id="count-pill">— padrões</div>
</header>

<div class="app">

  <!-- SIDEBAR DESKTOP -->
  <div class="sidebar">
    <div class="sb-sec">
      <div class="sec-lbl">Cores</div>
      <div class="c-block"><span class="c-lbl">Fundo</span>
        <div class="c-row"><div class="swatch"><div class="swatch-inner" id="si-bg" style="background:#1a1a2e"></div><input type="color" id="cb" value="#1a1a2e"></div><div class="presets" id="pb"></div></div>
      </div>
      <div class="c-block"><span class="c-lbl">Cor 1</span>
        <div class="c-row"><div class="swatch"><div class="swatch-inner" id="si-c1" style="background:#f5c518"></div><input type="color" id="c1" value="#f5c518"></div><div class="presets" id="p1"></div></div>
      </div>
      <div class="c-block"><span class="c-lbl">Cor 2</span>
        <div class="c-row"><div class="swatch"><div class="swatch-inner" id="si-c2" style="background:#e63946"></div><input type="color" id="c2" value="#e63946"></div><div class="presets" id="p2"></div></div>
      </div>
      <div class="c-block" style="margin-bottom:0"><span class="c-lbl">Cor 3</span>
        <div class="c-row"><div class="swatch"><div class="swatch-inner" id="si-c3" style="background:#2a9d8f"></div><input type="color" id="c3" value="#2a9d8f"></div><div class="presets" id="p3"></div></div>
      </div>
    </div>
    <div class="sb-sec">
      <div class="sec-lbl">Logo / Imagem</div>
      <div class="upload-zone">
        <input type="file" id="logo-inp" accept="image/*">
        <img id="logo-thumb" src="" alt="logo">
        <div id="uph"><div class="uico">📁</div><p>Clique para adicionar<br>logo ao centro da pipa</p></div>
      </div>
      <div id="logo-ctrls" style="display:none">
        <div class="sl-row" style="margin-top:10px"><label>Tamanho <span id="lsv">30%</span></label><input type="range" id="lsz" min="8" max="65" value="30"></div>
        <div class="sl-row"><label>Opacidade <span id="lov">100%</span></label><input type="range" id="lop" min="10" max="100" value="100"></div>
        <button class="btn btn-ghost" id="rm-logo" style="margin-top:8px;font-size:0.7rem;padding:7px">✕ Remover imagem</button>
      </div>
    </div>
    <div class="sb-sec">
      <div class="sec-lbl">Ações</div>
      <div class="btns-col">
        <button class="btn btn-rand" id="btn-rand">🎲 Aleatório</button>
        <button class="btn btn-gold" id="btn-apply">✔ Aplicar Cores</button>
      </div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main-area">
    <div class="gallery-head">
      <h2>Galeria de Padrões</h2>
      <div class="tabs-wrap" id="tabs">
        <div class="tab active" data-cat="todos">Todos</div>
        <div class="tab" data-cat="cruz">Cruz</div>
        <div class="tab" data-cat="listras">Listras</div>
        <div class="tab" data-cat="diagonal">Diagonal</div>
        <div class="tab" data-cat="geo">Geométrico</div>
        <div class="tab" data-cat="especial">Especial</div>
        <div class="tab" data-cat="selecoes">⚽ Seleções</div>
      </div>
    </div>
    <div class="pat-gallery" id="pat-gallery"></div>
    <div class="stage">
      <div class="pname-tag" id="pname">Cruz Dupla</div>
      <canvas id="kite-canvas" width="520" height="620"></canvas>
      <div class="stage-btns">
        <button class="btn btn-dl" id="btn-dl">⬇ Baixar PNG</button>
      </div>
    </div>
  </div>
</div>

<!-- FAB download mobile -->
<button class="fab-dl" id="fab-dl" title="Baixar PNG">⬇</button>

<!-- BOTTOM NAV MOBILE -->
<nav class="mobile-nav" id="mobile-nav">
  <button class="nav-btn active" id="nb-padroes" onclick="openSheet('padroes')">
    <span class="nav-ico">🎨</span><span class="nav-lbl">Padrões</span>
  </button>
  <button class="nav-btn" id="nb-cores" onclick="openSheet('cores')">
    <span class="nav-ico">🖌️</span><span class="nav-lbl">Cores</span>
  </button>
  <button class="nav-btn" id="nb-logo" onclick="openSheet('logo')">
    <span class="nav-ico">🏷️</span><span class="nav-lbl">Logo</span>
  </button>
  <button class="nav-btn" id="nb-acoes" onclick="openSheet('acoes')">
    <span class="nav-ico">⚡</span><span class="nav-lbl">Ações</span>
  </button>
</nav>

<!-- OVERLAY -->
<div class="sheet-overlay" id="overlay" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET -->
<div class="bottom-sheet" id="bottom-sheet">
  <div class="sh-handle"></div>
  <div class="sh-title" id="sh-title">Padrões</div>
  <div class="sh-body" id="sh-body"></div>
</div>

<script>
/* ─── STATE ─── */
const C={bg:'#1a1a2e',c1:'#f5c518',c2:'#e63946',c3:'#2a9d8f'};
let curId='cruz_dupla',logoImg=null,logoSz=0.3,logoOp=1,curCat='todos',activeSheet=null;

/* ─── KITE GEOMETRY ─── */
function kiteCoords(w,h){return{vergTop:h*.02,vergH:h*.24,midBot:h*.72,bot:h*.97,left:w*.03,right:w*.97,cx:w/2}}
function bodyPath(ctx,w,h){const k=kiteCoords(w,h);ctx.beginPath();ctx.moveTo(k.cx,k.vergH);ctx.lineTo(k.right,k.vergH);ctx.lineTo(k.right,k.midBot);ctx.lineTo(k.cx,k.bot);ctx.lineTo(k.left,k.midBot);ctx.lineTo(k.left,k.vergH);ctx.closePath()}
function withClip(ctx,w,h,fn){ctx.save();bodyPath(ctx,w,h);ctx.clip();fn();ctx.restore()}
function fill(ctx,w,h,col){ctx.fillStyle=col;ctx.fillRect(0,0,w,h)}
function drawFrame(ctx,w,h){
  const k=kiteCoords(w,h);
  ctx.save();bodyPath(ctx,w,h);ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=4.5;ctx.stroke();ctx.strokeStyle='rgba(255,255,255,.06)';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  ctx.save();ctx.strokeStyle='rgba(180,140,70,.75)';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(k.left,k.vergH);ctx.lineTo(k.right,k.vergH);ctx.stroke();

  {id:'sel_inglaterra',name:'Inglaterra',cat:'selecoes',fn:(ctx,w,h,c)=>{fill(ctx,w,h,'#fff');const t=w*.12;ctx.fillStyle='#cf142b';ctx.fillRect(w/2-t/2,0,t,h);ctx.fillRect(0,h/2-t/2,w,t)}},

  {id:'sel_mexico',name:'México 🇲🇽',cat:'selecoes',fn:(ctx,w,h,c)=>{[['#006847',0],['#fff',w/3],['#ce1126',2*w/3]].forEach(([col,x])=>{ctx.fillStyle=col;ctx.fillRect(x,0,w/3+1,h)});ctx.fillStyle='#006847';ctx.beginPath();ctx.arc(w/2,h*.5,w*.08,0,Math.PI*2);ctx.fill()}},
  {id:'sel_uruguai',name:'Uruguai 🇺🇾',cat:'selecoes',fn:(ctx,w,h,c)=>{fill(ctx,w,h,'#fff');for(let i=0;i<9;i++){if(i%2===0){ctx.fillStyle='#5EB6E4';ctx.fillRect(0,i*h/9,w,h/9+1)}}ctx.fillStyle='#fff';ctx.fillRect(0,0,w*.4,h*.4);ctx.fillStyle='#f6b40e';ctx.save();ctx.translate(w*.2,h*.2);ctx.beginPath();ctx.arc(0,0,w*.08,0,Math.PI*2);ctx.fill();ctx.restore()}},
  {id:'sel_coreia',name:'Coreia Sul 🇰🇷',cat:'selecoes',fn:(ctx,w,h,c)=>{fill(ctx,w,h,'#fff');ctx.fillStyle='#c60c30';ctx.beginPath();ctx.arc(w*.5,h*.5,w*.2,Math.PI,0);ctx.closePath();ctx.fill();ctx.fillStyle='#003478';ctx.beginPath();ctx.arc(w*.5,h*.5,w*.2,0,Math.PI);ctx.closePath();ctx.fill()}},
  {id:'sel_senegal',name:'Senegal 🇸🇳',cat:'selecoes',fn:(ctx,w,h,c)=>{[['#00853f',0],['#fdef42',w/3],['#e31b23',2*w/3]].forEach(([col,x])=>{ctx.fillStyle=col;ctx.fillRect(x,0,w/3+1,h)});ctx.fillStyle='#00853f';ctx.save();ctx.translate(w*.5,h*.5);ctx.beginPath();for(let i=0;i<10;i++){const a=i*Math.PI/5-Math.PI/2,r=i%2===0?w*.1:w*.04;i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r)}ctx.closePath();ctx.fill();ctx.restore()}},

  {id:'sel_croacia',name:'Croácia 🇭🇷',cat:'selecoes',fn:(ctx,w,h,c)=>{[['#FF0000',0],['#fff',h/3],['#0000CC',2*h/3]].forEach(([col,y])=>{ctx.fillStyle=col;ctx.fillRect(0,y,w,h/3+1)});const sq=w*.055,ox=w*.5-sq*2.5,oy=h*.35;for(let r=0;r<3;r++)for(let cl=0;cl<5;cl++){ctx.fillStyle=(r+cl)%2===0?'#FF0000':'#fff';ctx.fillRect(ox+cl*sq,oy+r*sq,sq,sq)}}},
  {id:'sel_usa',name:'EUA 🇺🇸',cat:'selecoes',fn:(ctx,w,h,c)=>{for(let i=0;i<13;i++){ctx.fillStyle=i%2===0?'#b22234':'#fff';ctx.fillRect(0,i*h/13,w,h/13+1)}ctx.fillStyle='#3c3b6e';ctx.fillRect(0,0,w*.4,h*.55);ctx.fillStyle='#fff';for(let r=0;r<5;r++)for(let cl=0;cl<6;cl++){ctx.beginPath();ctx.arc(w*(.04+cl*.062),h*(.06+r*.09),w*.016,0,Math.PI*2);ctx.fill()}}},
];

const PALETTES=[
  {bg:'#0d1b2a',c1:'#f5c518',c2:'#e63946',c3:'#fff'},{bg:'#fff',c1:'#e63946',c2:'#1d3557',c3:'#457b9d'},
  {bg:'#2d6a4f',c1:'#95d5b2',c2:'#ffd166',c3:'#ef233c'},{bg:'#6a0572',c1:'#f72585',c2:'#ffd60a',c3:'#fff'},
  {bg:'#023e8a',c1:'#48cae4',c2:'#fff',c3:'#ade8f4'},{bg:'#370617',c1:'#f48c06',c2:'#ffba08',c3:'#fff'},
  {bg:'#212529',c1:'#f5c518',c2:'#e63946',c3:'#adb5bd'},{bg:'#fff3b0',c1:'#e09f3e',c2:'#9e2a2b',c3:'#335c67'},
  {bg:'#04052e',c1:'#cc2936',c2:'#f5f5f5',c3:'#e4c1f9'},{bg:'#000',c1:'#f5c518',c2:'#fff',c3:'#f5c518'},
  {bg:'#1b4332',c1:'#52b788',c2:'#d8f3dc',c3:'#081c15'},{bg:'#560bad',c1:'#f72585',c2:'#4cc9f0',c3:'#fff'},
  {bg:'#ff6b35',c1:'#004e89',c2:'#fff',c3:'#ffd60a'},
];
const CLRS=['#e63946','#f5c518','#2a9d8f','#264653','#e9c46a','#f4a261','#457b9d','#1d3557','#a8dadc','#fff','#000','#6a0572','#ff6b35','#00b4d8','#06d6a0','#8338ec','#3a86ff','#fb5607','#ffbe0b','#023047','#ef233c','#4cc9f0','#7209b7','#2d6a4f'];

/* ─── RENDER ─── */
function renderKite(){
  const canvas=document.getElementById('kite-canvas');
  const ctx=canvas.getContext('2d');
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  const pat=PATTERNS.find(p=>p.id===curId);if(!pat)return;
  withClip(ctx,W,H,()=>pat.fn(ctx,W,H,C));
  drawFrame(ctx,W,H);
  if(logoImg){
    const k=kiteCoords(W,H);const cy=(k.vergH+k.midBot)/2,cx=W/2;
    const maxW=W*logoSz,maxH=(k.midBot-k.vergH)*logoSz*.85;
    const ratio=logoImg.width/logoImg.height;
    let lw=maxW,lh=maxW/ratio;if(lh>maxH){lh=maxH;lw=maxH*ratio}
    ctx.save();ctx.globalAlpha=logoOp;ctx.drawImage(logoImg,cx-lw/2,cy-lh/2,lw,lh);ctx.restore();
  }
  document.getElementById('pname').textContent=pat.name;
}

/* ─── GALLERY ─── */
function makeCard(p,container,onClickExtra){
  const card=document.createElement('div');card.className='pat-card'+(p.id===curId?' active':'');card.dataset.id=p.id;
  const cv=document.createElement('canvas');cv.width=62;cv.height=70;
  const ctx=cv.getContext('2d');withClip(ctx,62,70,()=>p.fn(ctx,62,70,C));
  ctx.save();bodyPath(ctx,62,70);ctx.strokeStyle='#00000066';ctx.lineWidth=1.5;ctx.stroke();ctx.restore();
  const badge=document.createElement('div');badge.className='chk';badge.textContent='✓';
  const label=document.createElement('span');label.textContent=p.name;
  card.appendChild(badge);card.appendChild(cv);card.appendChild(label);
  card.addEventListener('click',()=>{
    curId=p.id;
    document.querySelectorAll('.pat-card').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('[data-id="'+p.id+'"]').forEach(c=>c.classList.add('active'));
    renderKite();
    if(onClickExtra)onClickExtra();
  });
  container.appendChild(card);
}
function buildGallery(){
  const container=document.getElementById('pat-gallery');if(!container)return;
  container.innerHTML='';
  const list=curCat==='todos'?PATTERNS:PATTERNS.filter(p=>p.cat===curCat);
  list.forEach(p=>makeCard(p,container));
  document.getElementById('count-pill').textContent=PATTERNS.length+' padrões';
}

/* ─── PRESETS ─── */
function buildPresets(cid,key,dotClass){
  const el=document.getElementById(cid);if(!el)return;el.innerHTML='';
  CLRS.forEach(hex=>{
    const d=document.createElement('div');d.className=dotClass||'dot';d.style.background=hex;
    if(hex==='#fff')d.style.boxShadow='0 0 0 1px #ffffff40';
    d.addEventListener('click',()=>{
      C[key]=hex;
      ['si-','msi-'].forEach(pre=>{const e=document.getElementById(pre+key);if(e)e.style.background=hex});
      const di=document.getElementById(key==='bg'?'cb':key);if(di)di.value=hex;
      const mc=document.getElementById('mc-'+key);if(mc)mc.value=hex;
      buildGallery();renderKite();
    });
    el.appendChild(d);
  });
}

/* ─── COLOR SYNC ─── */
function syncColor(key,hex){
  C[key]=hex;
  ['si-','msi-'].forEach(pre=>{const e=document.getElementById(pre+key);if(e)e.style.background=hex});
  buildGallery();renderKite();
}
[['cb','bg'],['c1','c1'],['c2','c2'],['c3','c3']].forEach(([id,key])=>{
  const el=document.getElementById(id);if(el)el.addEventListener('input',()=>syncColor(key,el.value));
});

/* ─── DESKTOP TABS ─── */
document.querySelectorAll('#tabs .tab').forEach(tab=>{
  tab.addEventListener('click',()=>{
    document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.remove('active'));
    tab.classList.add('active');curCat=tab.dataset.cat;buildGallery();
  });
});

/* ─── LOGO ─── */
function handleLogoFile(file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>{const img=new Image();img.onload=()=>{
    logoImg=img;
    ['logo-thumb','mob-logo-thumb'].forEach(id=>{const e=document.getElementById(id);if(e){e.src=ev.target.result;e.style.display='block'}});
    ['uph','mob-uph'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none'});
    ['logo-ctrls','mob-logo-ctrls'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='block'});
    renderKite();
  };img.src=ev.target.result};
  reader.readAsDataURL(file);
}
function removeLogo(){
  logoImg=null;
  ['logo-thumb','mob-logo-thumb'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none'});
  ['uph','mob-uph'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='block'});
  ['logo-ctrls','mob-logo-ctrls'].forEach(id=>{const e=document.getElementById(id);if(e)e.style.display='none'});
  ['logo-inp','mob-logo-inp'].forEach(id=>{const e=document.getElementById(id);if(e)e.value=''});
  renderKite();
}
document.getElementById('logo-inp').addEventListener('change',e=>handleLogoFile(e.target.files[0]));
document.getElementById('rm-logo').addEventListener('click',removeLogo);
document.getElementById('lsz').addEventListener('input',e=>{logoSz=e.target.value/100;document.getElementById('lsv').textContent=e.target.value+'%';renderKite()});
document.getElementById('lop').addEventListener('input',e=>{logoOp=e.target.value/100;document.getElementById('lov').textContent=e.target.value+'%';renderKite()});

/* ─── ALEATÓRIO ─── */
function doRandom(){
  const pal=PALETTES[Math.floor(Math.random()*PALETTES.length)];Object.assign(C,pal);
  [['cb','bg'],['c1','c1'],['c2','c2'],['c3','c3']].forEach(([id,key])=>{
    if(!C[key])return;
    const e=document.getElementById(id);if(e)e.value=C[key];
    const mc=document.getElementById('mc-'+key);if(mc)mc.value=C[key];
    ['si-','msi-'].forEach(pre=>{const el=document.getElementById(pre+key);if(el)el.style.background=C[key]});
  });
  const geo=PATTERNS.filter(p=>p.cat!=='selecoes');
  curId=geo[Math.floor(Math.random()*geo.length)].id;
  buildGallery();renderKite();
}
document.getElementById('btn-rand').addEventListener('click',doRandom);
document.getElementById('btn-apply').addEventListener('click',()=>{buildGallery();renderKite()});

/* ─── DOWNLOAD ─── */
function doDownload(){
  const canvas=document.getElementById('kite-canvas');
  const link=document.createElement('a');link.download='pipa-'+curId+'.png';link.href=canvas.toDataURL('image/png');link.click();
}
document.getElementById('btn-dl').addEventListener('click',doDownload);
document.getElementById('fab-dl').addEventListener('click',doDownload);

/* ─── BOTTOM SHEET ─── */
const SHEET_TITLES={padroes:'🎨 Padrões',cores:'🖌️ Cores',logo:'🏷️ Logo',acoes:'⚡ Ações'};

function openSheet(name){
  if(activeSheet===name){closeSheet();return}
  activeSheet=name;
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  const nb=document.getElementById('nb-'+name);if(nb)nb.classList.add('active');
  document.getElementById('sh-title').textContent=SHEET_TITLES[name]||name;
  buildSheetContent(name);
  document.getElementById('bottom-sheet').classList.add('open');
  document.getElementById('overlay').classList.add('vis');
}
function closeSheet(){
  activeSheet=null;
  document.getElementById('bottom-sheet').classList.remove('open');
  document.getElementById('overlay').classList.remove('vis');
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
}

function buildSheetContent(name){
  const body=document.getElementById('sh-body');body.innerHTML='';

  if(name==='padroes'){
    const cats=[{key:'todos',label:'Todos'},{key:'cruz',label:'Cruz'},{key:'listras',label:'Listras'},{key:'diagonal',label:'Diagonal'},{key:'geo',label:'Geométrico'},{key:'especial',label:'Especial'},{key:'selecoes',label:'⚽ Seleções'}];
    const cDiv=document.createElement('div');cDiv.className='mob-cats';
    cats.forEach(ct=>{
      const btn=document.createElement('button');btn.className='mob-cat'+(curCat===ct.key?' active':'');btn.textContent=ct.label;
      btn.addEventListener('click',()=>{
        curCat=ct.key;cDiv.querySelectorAll('.mob-cat').forEach(b=>b.classList.remove('active'));btn.classList.add('active');
        buildMobGallery(gDiv);
        document.querySelectorAll('#tabs .tab').forEach(t=>t.classList.toggle('active',t.dataset.cat===curCat));
        buildGallery();
      });
      cDiv.appendChild(btn);
    });
    body.appendChild(cDiv);
    const gDiv=document.createElement('div');gDiv.className='mob-gallery';body.appendChild(gDiv);
    buildMobGallery(gDiv);
  }

  else if(name==='cores'){
    const wrap=document.createElement('div');wrap.className='mob-colors';body.appendChild(wrap);
    [['bg','Fundo'],['c1','Cor 1'],['c2','Cor 2'],['c3','Cor 3']].forEach(([key,label])=>{
      const row=document.createElement('div');row.className='mob-c-row';
      const lbl=document.createElement('div');lbl.className='mob-c-label';lbl.textContent=label;
      const sw=document.createElement('div');sw.className='mob-swatch';
      const si=document.createElement('div');si.className='mob-swatch-inner';si.id='msi-'+key;si.style.background=C[key];
      const inp=document.createElement('input');inp.type='color';inp.id='mc-'+key;inp.value=C[key];
      inp.addEventListener('input',()=>{C[key]=inp.value;si.style.background=inp.value;const ds=document.getElementById('si-'+key);if(ds)ds.style.background=inp.value;const di=document.getElementById(key==='bg'?'cb':key);if(di)di.value=inp.value;buildGallery();renderKite()});
      sw.appendChild(si);sw.appendChild(inp);
      const dots=document.createElement('div');dots.className='mob-dots';dots.id='md-'+key;
      row.appendChild(lbl);row.appendChild(sw);row.appendChild(dots);wrap.appendChild(row);
      buildPresets('md-'+key,key,'mob-dot');
    });
  }

  else if(name==='logo'){
    const uz=document.createElement('div');uz.className='mob-upload';
    const inp=document.createElement('input');inp.type='file';inp.id='mob-logo-inp';inp.accept='image/*';
    inp.addEventListener('change',e=>handleLogoFile(e.target.files[0]));
    const thumb=document.createElement('img');thumb.id='mob-logo-thumb';thumb.style.display='none';
    if(logoImg&&document.getElementById('logo-thumb').src){thumb.src=document.getElementById('logo-thumb').src;thumb.style.display='block'}
    const ph=document.createElement('div');ph.id='mob-uph';if(logoImg)ph.style.display='none';
    ph.innerHTML='<div class="uico">📁</div><p>Toque para adicionar<br>logo ao centro da pipa</p>';
    uz.appendChild(inp);uz.appendChild(thumb);uz.appendChild(ph);body.appendChild(uz);

    const ctrls=document.createElement('div');ctrls.id='mob-logo-ctrls';ctrls.style.display=logoImg?'block':'none';
    const lszVal=Math.round(logoSz*100),lopVal=Math.round(logoOp*100);
    ctrls.innerHTML=`<div class="mob-sl-row"><label>Tamanho <span id="mlsv">${lszVal}%</span></label><input type="range" id="mlsz" min="8" max="65" value="${lszVal}"></div><div class="mob-sl-row"><label>Opacidade <span id="mlov">${lopVal}%</span></label><input type="range" id="mlop" min="10" max="100" value="${lopVal}"></div>`;
    const rm=document.createElement('button');rm.className='btn btn-ghost';rm.style.cssText='margin-top:10px;font-size:0.8rem;padding:10px';rm.textContent='✕ Remover imagem';rm.addEventListener('click',removeLogo);
    ctrls.appendChild(rm);body.appendChild(ctrls);
    setTimeout(()=>{
      const mlsz=document.getElementById('mlsz');if(mlsz)mlsz.addEventListener('input',e=>{logoSz=e.target.value/100;document.getElementById('mlsv').textContent=e.target.value+'%';document.getElementById('lsv').textContent=e.target.value+'%';document.getElementById('lsz').value=e.target.value;renderKite()});
      const mlop=document.getElementById('mlop');if(mlop)mlop.addEventListener('input',e=>{logoOp=e.target.value/100;document.getElementById('mlov').textContent=e.target.value+'%';document.getElementById('lov').textContent=e.target.value+'%';document.getElementById('lop').value=e.target.value;renderKite()});
    },0);
  }

  else if(name==='acoes'){
    const wrap=document.createElement('div');wrap.className='mob-actions';
    const rBtn=document.createElement('button');rBtn.className='btn btn-rand';rBtn.textContent='🎲 Design Aleatório';rBtn.addEventListener('click',doRandom);
    const dBtn=document.createElement('button');dBtn.className='btn btn-gold';dBtn.textContent='⬇ Baixar PNG';dBtn.addEventListener('click',doDownload);
    const cBtn=document.createElement('button');cBtn.className='btn btn-ghost';cBtn.textContent='✕ Fechar';cBtn.addEventListener('click',closeSheet);
    wrap.appendChild(rBtn);wrap.appendChild(dBtn);wrap.appendChild(cBtn);body.appendChild(wrap);
  }
}

function buildMobGallery(container){
  container.innerHTML='';
  const list=curCat==='todos'?PATTERNS:PATTERNS.filter(p=>p.cat===curCat);
  list.forEach(p=>makeCard(p,container,closeSheet));
  document.getElementById('count-pill').textContent=PATTERNS.length+' padrões';
}

/* ─── INIT ─── */
buildPresets('pb','bg');buildPresets('p1','c1');buildPresets('p2','c2');buildPresets('p3','c3');
buildGallery();renderKite();
</script>
